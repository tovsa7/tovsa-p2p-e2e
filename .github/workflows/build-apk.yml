name: Build TWA APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  KEYSTORE_PASS: tovsa-store-pass
  KEY_PASS:      tovsa-key-pass
  KEY_ALIAS:     tovsa

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Get version
        id: version
        run: |
          HASH=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          echo "VERSION=${DATE}-${HASH}" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$(date +%s | tail -c 6)" >> $GITHUB_OUTPUT

      # ── Keystore ──────────────────────────────────────────────────────────────
      - name: Setup keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > tovsa.keystore
            echo "Используем существующий keystore"
          else
            keytool -genkeypair -v \
              -keystore tovsa.keystore \
              -alias "$KEY_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KEYSTORE_PASS" \
              -keypass   "$KEY_PASS" \
              -dname "CN=Tovsa,O=Tovsa,C=RU" \
              -noprompt
            echo "Сгенерирован новый keystore"
            echo "======== СОХРАНИТЕ КАК СЕКРЕТ KEYSTORE_BASE64 ========"
            base64 -w 0 tovsa.keystore
            echo ""
            echo "======================================================"
          fi

          FINGERPRINT=$(keytool -list -v \
            -keystore tovsa.keystore \
            -alias "$KEY_ALIAS" \
            -storepass "$KEYSTORE_PASS" \
            2>/dev/null | grep "SHA256:" | head -1 \
            | sed 's/.*SHA256: //' | tr -d ' ')
          echo "SHA256_FINGERPRINT=${FINGERPRINT}" >> $GITHUB_OUTPUT
          echo "Fingerprint: ${FINGERPRINT}"

      # ── assetlinks.json ───────────────────────────────────────────────────────
      - name: Generate assetlinks.json
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          mkdir -p .well-known
          cat > .well-known/assetlinks.json << AEOF
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "com.tovsa.app",
              "sha256_cert_fingerprints": ["${{ steps.keystore.outputs.SHA256_FINGERPRINT }}"]
            }
          }]
          AEOF
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .well-known/assetlinks.json
          git diff --staged --quiet || git commit -m "chore: update assetlinks.json [skip ci]"
          git push || true

      # ── Init + Build APK ─────────────────────────────────────────────────────
      # bubblewrap init читает PWA manifest.json по URL,
      # затем патчим сгенерированный twa-manifest.json и собираем
      - name: Build APK
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          VERSION_CODE="${{ steps.version.outputs.VERSION_CODE }}"
          WS="${{ github.workspace }}"

          mkdir -p twa-build && cd twa-build

          # bubblewrap init — принимает URL PWA manifest.json
          bubblewrap init \
            --manifest "${PAGES_URL}/manifest.json" \
            --skipPwaValidation

          # Патчим сгенерированный twa-manifest.json
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json','utf8'));
            m.signingKey = { path: process.env.WS + '/tovsa.keystore', alias: 'tovsa' };
            m.appVersion = process.env.VERSION;
            m.appVersionCode = parseInt(process.env.VERSION_CODE);
            m.packageId = 'com.tovsa.app';
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
            console.log('Patched:', m.packageId, m.appVersion);
          "

          bubblewrap build --skipPwaValidation
        env:
          WS:                           ${{ github.workspace }}
          VERSION:                      ${{ steps.version.outputs.VERSION }}
          VERSION_CODE:                 ${{ steps.version.outputs.VERSION_CODE }}
          BUBBLEWRAP_KEYSTORE_PATH:     ${{ github.workspace }}/tovsa.keystore
          BUBBLEWRAP_KEY_ALIAS:         ${{ env.KEY_ALIAS }}
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASS }}
          BUBBLEWRAP_KEY_PASSWORD:      ${{ env.KEY_PASS }}
          JAVA_TOOL_OPTIONS:            "-Dfile.encoding=UTF-8"
          ANDROID_HOME:                 /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT:             /usr/local/lib/android/sdk

      - name: Find and rename APK
        id: apk
        run: |
          APK=$(find twa-build -name "*.apk" -not -name "*unsigned*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find twa-build -name "*.apk" | head -1)
          fi
          VERSION="${{ steps.version.outputs.VERSION }}"
          DEST="tovsa-${VERSION}.apk"
          cp "$APK" "$DEST"
          echo "APK_PATH=${DEST}" >> $GITHUB_OUTPUT
          echo "APK: ${DEST} ($(du -h $DEST | cut -f1))"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name:     "Tovsa ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Установка

            ### Android APK (sideload)
            1. Скачайте `tovsa-*.apk`
            2. Android: Настройки → Безопасность → Установка из неизвестных источников
            3. Установите APK

            ### PWA (все платформы)
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
            Откройте → «Установить приложение»

            ---
            `${{ github.sha }}`
          files: ${{ steps.apk.outputs.APK_PATH }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
