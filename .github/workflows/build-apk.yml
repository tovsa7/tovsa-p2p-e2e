name: Build TWA APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  KEYSTORE_PASS: tovsa-store-pass
  KEY_PASS:      tovsa-key-pass
  KEY_ALIAS:     tovsa

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Get version
        id: version
        run: |
          HASH=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          echo "VERSION=${DATE}-${HASH}" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$(date +%s | tail -c 6)" >> $GITHUB_OUTPUT

      - name: Setup keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > tovsa.keystore
            echo "Используем существующий keystore"
          else
            keytool -genkeypair -v \
              -keystore tovsa.keystore \
              -alias "$KEY_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KEYSTORE_PASS" \
              -keypass   "$KEY_PASS" \
              -dname "CN=Tovsa,O=Tovsa,C=RU" \
              -storetype JKS \
              -noprompt
            echo "======== СОХРАНИТЕ КАК СЕКРЕТ KEYSTORE_BASE64 ========"
            base64 -w 0 tovsa.keystore
            echo ""
          fi
          FINGERPRINT=$(keytool -list -v \
            -keystore tovsa.keystore \
            -alias "$KEY_ALIAS" \
            -storepass "$KEYSTORE_PASS" \
            2>/dev/null | grep "SHA256:" | head -1 | sed 's/.*SHA256: //' | tr -d ' ')
          echo "SHA256_FINGERPRINT=${FINGERPRINT}" >> $GITHUB_OUTPUT

      - name: Generate assetlinks.json
        run: |
          mkdir -p .well-known
          printf '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"com.tovsa.app","sha256_cert_fingerprints":["%s"]}}]' \
            "${{ steps.keystore.outputs.SHA256_FINGERPRINT }}" > .well-known/assetlinks.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .well-known/assetlinks.json
          git diff --staged --quiet || git commit -m "chore: update assetlinks.json [skip ci]"
          git push || true

      - name: Verify keystore
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Verifying keystore..."
          keytool -list -v             -keystore tovsa.keystore             -alias "$KEY_ALIAS"             -storepass "$KEYSTORE_PASS" 2>&1 | grep -E "Alias|Valid|SHA256|Entry type" || true
          # Конвертируем в JKS если нужно
          if keytool -importkeystore             -srckeystore tovsa.keystore -destkeystore tovsa-jks.keystore             -srcstoretype PKCS12 -deststoretype JKS             -srcstorepass "$KEYSTORE_PASS" -deststorepass "$KEYSTORE_PASS"             -srcalias "$KEY_ALIAS" -destalias "$KEY_ALIAS"             -srckeypass "$KEY_PASS" -destkeypass "$KEY_PASS"             -noprompt 2>/dev/null; then
            mv tovsa-jks.keystore tovsa.keystore
            echo "Converted to JKS, updating Secret..."
            gh secret set KEYSTORE_BASE64 --body "$(base64 -w 0 tovsa.keystore)"               || echo "Secret update skipped"
          else
            echo "Already JKS or same format"
          fi

      - name: Build APK
        run: |
          export VERSION="${{ steps.version.outputs.VERSION }}"
          export VERSION_CODE="${{ steps.version.outputs.VERSION_CODE }}"
          chmod +x build-twa.sh
          bash build-twa.sh
        env:
          KEYSTORE_PASS: ${{ env.KEYSTORE_PASS }}
          KEY_PASS:      ${{ env.KEY_PASS }}
          KEY_ALIAS:     ${{ env.KEY_ALIAS }}
          ANDROID_HOME:  /usr/local/lib/android/sdk

      - name: Find and rename APK
        id: apk
        run: |
          APK=$(find twa-project -name "*release*.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find twa-project -name "*.apk" | head -1)
          fi
          VERSION="${{ steps.version.outputs.VERSION }}"
          DEST="tovsa-${VERSION}.apk"
          cp "$APK" "$DEST"
          echo "APK_PATH=${DEST}" >> $GITHUB_OUTPUT
          echo "APK: ${DEST} ($(du -h $DEST | cut -f1))"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name:     "Tovsa ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Установка

            ### Android APK
            1. Скачайте `tovsa-*.apk`
            2. Android: Настройки → Безопасность → Установка из неизвестных источников
            3. Установите

            ### PWA
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

            ---
            `${{ github.sha }}`
          files: ${{ steps.apk.outputs.APK_PATH }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
